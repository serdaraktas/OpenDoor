name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kaynak kodu indir
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle wrapper hazırla
        run: chmod +x ./gradlew

      - name: Mipmap icon dosyalarını temizle
        run: |
          find app/src/main/res/mipmap-* -type f -name "*.xml" -delete || true

      - name: APK derle
        run: ./gradlew assembleRelease

      - name: APK dosyalarını listele
        run: find app/build/outputs -type f -name "*.apk"

      - name: APK dosyasını bul
        run: find . -type f -name "*.apk" -print

      - name: APK'yı artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "**/*.apk"
