name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kaynak kodu indir
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Bozuk Gradle wrapper jar dosyasını sil
        run: rm -f gradle/wrapper/gradle-wrapper.jar

      - name: Gradle kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4

      - name: Mipmap icon dosyalarını temizle
        run: |
          find app/src/main/res/mipmap-* -name "*.xml" -delete
          sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@drawable/ic_launcher_foreground"|g' app/src/main/AndroidManifest.xml
          sed -i '/android:roundIcon/d' app/src/main/AndroidManifest.xml
          echo "Temizleme tamamlandı"

      - name: APK derle
        run: gradle assembleDebug --no-daemon

      - name: APK dosyasını bul
        run: find . -type f -name "*.apk" -print

      - name: APK'yı artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: "**/*.apk"
