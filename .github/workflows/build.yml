name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kaynak kodu indir
        uses: actions/checkout@v4

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle wrapper hazırla
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Mipmap icon dosyalarını temizle
        run: find app/src/main/res/mipmap-* -name "*.xml" -delete

      - name: APK derle
        run: ./gradlew assembleRelease

      - name: APK'yı artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: kapi-ac-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
